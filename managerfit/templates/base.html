<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ManagerFit{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{{ url_for('index') }}">
      <span class="brand-mark">◇</span> ManagerFit
    </a>
    <nav>
      <a href="{{ url_for('assess_manager') }}">I'm a manager</a>
      <a href="{{ url_for('assess_candidate') }}">I'm a candidate</a>
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>ManagerFit — apply to a manager and team, not just a company. MVP demo.</p>
  </footer>
</body>
</html>
